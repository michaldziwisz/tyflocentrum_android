<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tyfloradio Cast Receiver</title>
  <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  <script defer src="./receiver.js"></script>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #101820;
      color: #f4f7fb;
      font-family: sans-serif;
    }

    .screen {
      box-sizing: border-box;
      width: 100%;
      height: 100%;
      padding: 48px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 16px;
      background:
        radial-gradient(circle at top left, rgba(75, 156, 211, 0.35), transparent 40%),
        radial-gradient(circle at bottom right, rgba(237, 125, 49, 0.28), transparent 45%),
        #101820;
    }

    .eyebrow {
      text-transform: uppercase;
      letter-spacing: 0.2em;
      font-size: 14px;
      opacity: 0.8;
    }

    .title {
      font-size: 56px;
      line-height: 1;
      font-weight: 700;
    }

    .subtitle {
      max-width: 720px;
      font-size: 24px;
      line-height: 1.4;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <main class="screen">
    <div class="eyebrow">Tyflopodcast</div>
    <div class="title">Tyfloradio</div>
    <div class="subtitle">Custom Cast receiver for live radio playback.</div>
  </main>
</body>
</html>
