name: Android CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0" "platform-tools"

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build debug APK and run lint
        run: ./gradlew --no-daemon assembleDebug lintDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: tyflocentrum-android-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload lint report
        uses: actions/upload-artifact@v4
        with:
          name: tyflocentrum-android-lint-report
          path: app/build/reports/lint-results-debug.html
